name: Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.js'
      - '.github/workflows/tests.yml'
  pull_request:
    branches: [main]

# Annule les runs en cours si un nouveau push arrive
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB 1 : Tests unitaires purs (node:test natif)
  # Cible : src/lib/bilanEngine.js, bilanHistory.js, etc.
  # Runner : node --test (déjà configuré dans package.json)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: Tests unitaires (node:test)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Lancer les tests unitaires
        run: npm run test:unit

  # ─────────────────────────────────────────────────────────────
  # JOB 2 : Tests hooks React (Vitest + jsdom)
  # Cible : src/hooks/*.vitest.jsx
  # Activé uniquement si Vitest est installé (devDep optionnel)
  # ─────────────────────────────────────────────────────────────
  hooks-tests:
    name: Tests hooks React (Vitest)
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Vérifier si Vitest est installé
        id: check-vitest
        run: |
          if npx vitest --version 2>/dev/null; then
            echo "vitest_available=true" >> $GITHUB_OUTPUT
          else
            echo "vitest_available=false" >> $GITHUB_OUTPUT
            echo "⚠️ Vitest non installé — job ignoré"
          fi

      - name: Lancer les tests Vitest
        if: steps.check-vitest.outputs.vitest_available == 'true'
        run: npm run test:hooks
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'mock-key' }}

  # ─────────────────────────────────────────────────────────────
  # JOB 3 : Build de vérification
  # S'assure que le projet compile sans erreur après chaque push
  # ─────────────────────────────────────────────────────────────
  build-check:
    name: Vérification build Vite
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Build Vite
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://mock.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'mock-key' }}
          VITE_APP_VERSION: ${{ github.sha }}
