name: Auto increment version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'package.json'  # éviter boucle infinie

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Ne bumper que sur feat/fix — ignorer refactor/test/ci/chore/docs
    if: |
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, 'refactor:') &&
      !contains(github.event.head_commit.message, 'test:') &&
      !contains(github.event.head_commit.message, 'ci:') &&
      !contains(github.event.head_commit.message, 'chore:') &&
      !contains(github.event.head_commit.message, 'docs:') &&
      github.event.head_commit.author.name != 'github-actions[bot]'
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "New version: $NEW_VERSION"
          git add package.json package-lock.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push
