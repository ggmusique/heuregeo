<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond bleu marine profond -->
  <rect width="512" height="512" rx="100" fill="#020818"/>
  <!-- Cercle décoratif doré externe -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#D4AF37" stroke-width="8" opacity="0.6"/>
  <!-- Cercle décoratif doré interne -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.3"/>
  <!-- Fond intérieur légèrement plus clair -->
  <circle cx="256" cy="256" r="190" fill="#0A1628"/>
  <!-- Lettre T -->
  <text x="148" y="300" font-family="Georgia, serif" font-style="italic" font-weight="900" font-size="160" fill="#D4AF37">T</text>
  <!-- Lettre R -->
  <text x="262" y="300" font-family="Georgia, serif" font-style="italic" font-weight="900" font-size="160" fill="#C9A84C">R</text>
  <!-- Ligne décorative dorée sous les lettres -->
  <line x1="148" y1="320" x2="356" y2="320" stroke="#D4AF37" stroke-width="3" opacity="0.7"/>
</svg>
