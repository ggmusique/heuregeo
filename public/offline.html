<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hors ligne — Tracko</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020818;
        color: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 24px;
      }
      .card {
        text-align: center;
        max-width: 320px;
      }
      .icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 24px;
        background: rgba(99,102,241,0.15);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      h1 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
      p { color: #94a3b8; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
      button {
        background: rgba(99,102,241,0.15);
        border: 1px solid rgba(99,102,241,0.3);
        color: #818cf8;
        padding: 12px 24px;
        border-radius: 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      button:hover { background: rgba(99,102,241,0.25); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">⚡</div>
      <h1>Vous êtes hors ligne</h1>
      <p>Connectez-vous à internet pour utiliser Heures de Geo. Les données déjà chargées restent disponibles.</p>
      <button onclick="window.location.reload()">Réessayer</button>
    </div>
  </body>
</html>
